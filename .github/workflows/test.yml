name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint

      - name: Run tests
        run: yarn test --passWithNoTests

      - name: Build application
        env:
          # jsonld.ts の resolveSiteUrl() が production build で throw するため、
          # CI でも canonical URL を渡す。本番 deploy では Vercel/Cloudflare 側の env で上書き
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://my-portfolio-kohl-one-59.vercel.app' }}
          # production build では default driver が 'github' になるが、CI には GITHUB_TOKEN 等を渡さない方針なので
          # 明示的に 'json' driver を選択してビルドを通す。本番 deploy (Vercel / Cloudflare Pages) では
          # それぞれの dashboard 側で REPOSITORY_DRIVER と GITHUB_TOKEN 等を設定する。
          REPOSITORY_DRIVER: json
        run: yarn build
